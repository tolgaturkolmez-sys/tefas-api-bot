name: TEFAS Gunluk Guncelleme

on:
  schedule:
    - cron: '30 07 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  veri-cek:
    runs-on: ubuntu-latest

    steps:
      - name: Repo çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Lib kur
        run: |
          pip install requests pandas firebase-admin

      - name: Firebase key oluştur
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > service_account.json

      - name: Script çalıştır
        run: |
          rm -f yatirim_fonlari.json
          python tefas_bot.py
          ls -la

      - name: Commit & Push
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'actions@github.com'
          git add yatirim_fonlari.json || true
          git commit -m "Fonlar guncellendi $(date +'%Y-%m-%d')" || echo "No change"
          git push
