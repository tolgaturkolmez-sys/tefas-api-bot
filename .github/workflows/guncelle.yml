name: TEFAS Gunluk Guncelleme

on:
  schedule:
    - cron: '30 07 * * 1-5' # Hafta içi her gün 10:30 TSİ
  workflow_dispatch: 

permissions:
  contents: write 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Repo Checkout
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Sadece Requests Yukle
        run: pip install requests

      - name: Veriyi Cek
        run: python tefas_bot.py

      - name: Degisiklikleri Kaydet
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add yatirim_fonlari.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Otomatik Güncelleme: $(date +'%Y-%m-%d')" && git push)
