- name: Gerekli Kütüphaneleri Yükle
  run: |
    python -m pip install --upgrade pip
    pip install webdriver-manager selenium requests  # webdriver-manager'ı buraya ekledik
    if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

name: TEFAS Gunluk Guncelleme

on:
  schedule:
    - cron: '30 07 * * 1-5'
  workflow_dispatch: 

permissions:
  contents: write 

jobs:
  veri-cek-ve-kaydet:
    runs-on: ubuntu-latest
    steps:
      - name: Kodları Al
        uses: actions/checkout@v3

      - name: Python Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Gerekli Kütüphaneleri Yükle
        # Buraya 'tefas' kütüphanesini ekledik
        run: pip install requests pandas tefas

      - name: TEFAS Botunu Çalıştır
        run: |
          python tefas_bot.py
          # Eğer dosya güncellenmediyse hata ver
          [ -f yatirim_fonlari.json ] || (echo "Dosya oluşturulamadı!" && exit 1)

      - name: Yeni Verileri GitHub'a Kaydet
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          if [ -f yatirim_fonlari.json ]; then
            git add yatirim_fonlari.json
            git diff --quiet && git diff --staged --quiet || (git commit -m "Otomatik Güncelleme: TEFAS Verileri" && git push)
          else
            echo "Dosya bulunamadı, kayıt işlemi atlanıyor."
          fi
