name: TEFAS Gunluk Guncelleme

on:
  schedule:
    # GitHub sunucuları UTC saat dilimindedir. 
    # 07:30 UTC = Türkiye Saati ile 10:30 demektir. (TEFAS verilerinin oturması için ideal bir saat)
    - cron: '30 07 * * 1-5'
  workflow_dispatch: 

permissions:
  contents: write 

jobs:
  veri-cek-ve-kaydet:
    runs-on: ubuntu-latest
    steps:
      - name: Kodları Al
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Kütüphaneleri Yükle
        run: |
          # ÖNEMLİ: curl_cffi ve tefas çıkarıldı. pandas ve lxml eklendi.
          pip install selenium webdriver-manager pandas lxml firebase-admin

      - name: Firebase Anahtarını Oluştur
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > service_account.json

      - name: TEFAS Botunu Çalıştır
        run: |
          # Önceki dosyayı temizle
          rm -f yatirim_fonlari.json
          
          # Botu tetikle
          python tefas_bot.py
          
          # Dosya oluştu mu kontrol et
          [ -f yatirim_fonlari.json ] || echo "UYARI: JSON dosyası oluşmadı. Bot ekrandan veri alamamış olabilir."

      - name: Yeni Verileri GitHub'a Kaydet (Yedek)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add yatirim_fonlari.json || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "Otomatik Güncelleme: $(date +'%Y-%m-%d')" && git push)
