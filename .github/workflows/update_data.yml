name: Tefas Otomatik API

on:
  schedule:
    - cron: '0 18 * * *' # Her gün TSİ 21:00'de çalışır
  workflow_dispatch: # Manuel çalıştırma butonu ekler

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Repoyu Klonla
        uses: actions/checkout@v3

      - name: Python Kurulumu
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Bağımlılıkları Yükle
        run: pip install requests

      - name: Botu Çalıştır
        run: python tefas_bot.py

      - name: Veriyi GitHub'a Gönder
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add yatirim_fonlari.json
          git commit -m "Güncel Fon Verileri: $(date +'%Y-%m-%d')" || echo "Değişiklik yok"
          git push
