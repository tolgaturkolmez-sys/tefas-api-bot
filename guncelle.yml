name: TEFAS Otomasyon

on:
  schedule:
    - cron: '30 07 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Repo çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Lib kur
        run: |
          pip install -r requirements.txt
          playwright install --with-deps

      - name: Firebase key
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > service_account.json

      - name: Scraper çalıştır
        run: |
          python tefas_scraper.py

      - name: Firebase upload
        run: |
          python firebase_upload.py

      - name: Commit JSON
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add yatirim_fonlari.json || true
          git commit -m "Fonlar güncellendi $(date +'%Y-%m-%d')" || echo "No change"
          git push
