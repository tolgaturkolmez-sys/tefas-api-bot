name: Tefas Playwright Bot

on:
  schedule:
    - cron: '0 18 * * *' # Her gün 21:00 TSİ
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Repoyu Klonla
        uses: actions/checkout@v3

      - name: Python Kurulumu
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Bağımlılıkları Yükle
        run: |
          pip install playwright
          # Playwright ve Chromium bağımlılıklarını kuran asıl komutlar:
          playwright install chromium
          playwright install-deps chromium

      - name: Botu Çalıştır
        run: python tefas_bot.py

      - name: Veriyi Kaydet
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add yatirim_fonlari.json
          git commit -m "Güncel Veri: $(date)" || echo "Değişiklik yok"
          git push
