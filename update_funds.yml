name: TEFAS Fon Verilerini Güncelle

on:
  schedule:
    - cron: "0 16 * * 1-5"
  workflow_dispatch:

jobs:
  update-funds:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Repo'yu klonla
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bağımlılıkları yükle
        run: pip install requests

      - name: TEFAS verilerini çek
        run: python tefas_bot.py

      - name: Değişiklikleri commit et ve push la
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "yatirim_fonlari .json"
          git diff --staged --quiet || git commit -m "chore: TEFAS fon verileri güncellendi ($(date '+%Y-%m-%d'))"
          git push
